# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 2
  gaps_in = 4
  gaps_out = 16
  
  col.active_border = rgb(FFFFFF) rgb(8070FF) rgb(5030FF)
  col.inactive_border = 0xff202020
}

decoration {
  rounding = 6
         
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.15
  dim_special = 0.8

  shadow {
    enabled = true
    range = 6
    render_power = 1

    color = 0xd0202020
    color_inactive = 0xff202020
  }


  blur {
    enabled = true	
    size = 6
    passes = 2
    ignore_opacity = true
    new_optimizations = true
    special = true
    popups = true
    blurls = waybar
  }
}

group {
  col.border_active = $color15

	groupbar {
		col.active = $color0
  }
}
